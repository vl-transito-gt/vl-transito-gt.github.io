<body onclick="verivicar()" onkeydown="verificar()">
|
    <!-- PANTALLA INICIAL -->
    <div id="inicio">

        <p>Introduce el código de 8 dígitos:</p>
        <input type="text" id="codigoInput" maxlength="8" onkeypress="verificar(event)" autofocus>
    </div>

    <!-- PANTALLA CORRECTA -->
    <div id="correcto" class="hidden">
        <img src=C:\top\vl-transito-gt.github.io\images\vl.transito.gob.gtConsultasLicenciasCristianGarcia.jpg alt="Perro">
        <h1>¡Acceso Correcto!</h1>
        <p>(Presiona cualquier tecla para volver)</p>
    </div>

    <!-- PANTALLA INCORRECTA -->
    <div id="incorrecto" class="hidden">
        <img src=C:\top\vl-transito-gt.github.io\images\vl.transito.gob.gtConsultasLicenciasCristianGarcia.jpg alt="Perro">
        <h1 class="error">INCORRECTO</h1>
        <p>(Presiona cualquier tecla para volver)</p>
    </div>

    <script>
        const CODIGO_SECRETO = "12345678"; // Cambia aquí tu código de 8 dígitos
        let estado = "preguntando";

        function verificar(event) {
            if (event.key === "Enter") {
                const input = document.getElementById("codigoInput").value;
                document.getElementById("inicio").classList.add("hidden");

                if (input === CODIGO_SECRETO) {
                    document.getElementById("correcto").classList.remove("hidden");
                    estado = "resultado";
                } else {
                    document.getElementById("incorrecto").classList.remove("hidden");
                    estado = "resultado";
                }
            }
        }

        function regresarAlInicio() {
            if (estado === "resultado") {
                // Limpiar input y resetear pantallas
                document.getElementById("codigoInput").value = "";
                document.getElementById("inicio").classList.remove("hidden");
                document.getElementById("correcto").classList.add("hidden");
                document.getElementById("incorrecto").classList.add("hidden");
                document.getElementById("codigoInput").focus();
                estado = "preguntando";
            }
        }
    </script>
</body>
