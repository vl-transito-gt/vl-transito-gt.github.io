<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width">
  <title>Maycom</title>
	
    <style>
        img { max-height: 100%; max-width: 200%; border-radius: 10px; margin-top: 0px; margin-bottom: 0px; }
        body {
            font-family: Arial, sans-serif;
            display: flex; 
            flex-direction: column;
            align-items: center;
            justify-content: center; 
            height: 100%; 
            background-color: #f0f2f5;
            margin: 0;
        }
        .imm-responsive {
            max-width: 100%;
            height : auto;
        }
        .container {
            background: white; 
            padding: 2rem; 
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            width: 350px;
            margin: 0;
        }
        input {
            padding: 10px;
            font-size: 1rem;
            width: 80%;
            margin-bottom: 1rem;
            border: 2px solid #ddd;
            border-radius: 5px;
            text-align: left;
        }
        button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        .resultado {
            margin-top: 20px;
            display: none;
        }
        .resultado img {
            max-width: 200px;
            border-radius: 8px;
        }
    </style>  

</head>
<body>
    <div class="col-xs-12 col-sm-8 col-md-6 col-lg-6 col-xl-6 offset-sm-2 offset-md-3 offset-lg-3 offset-xl-3">
        <img src="images/HeaderAlta.jpg" class="img-fluid" alt="Responsive image">
    </div>
    <div class="col-xs-12 col-sm-8 col-md-6 col-lg-6 col-xl-6 offset-sm-2 offset-md-3 offset-lg-3 offset-xl-3">
        <img src="images/upbodyAlta.jpg" class="img-fluid" alt="Responsive image">
    </div>



    <div id="contenedor">
    
        <center>
        <input type="text" id="userInput" maxlength="8" placeholder="Escribe aquí...">
        <br>
        <button onclick="verificar()">Validar</button><br>check<br>verifér<br>
        </center>

        
            
        
    </div>

    <div class="col-xs-12 col-sm-8 col-md-6 col-xl-6 offset-sm-2 offset-md-3 offset-lg-3 offset-xl-3">
        <img src="images/FooterAlta.jpg" class="img-fluid" alt="Responsive image">
    </div>

    <script>
        const CLAVE_CORRECTA = "1106459"; 
        // Configuración: Cambia esto por la clave que desees
        function verificar() {
            const input = document.getElementById('userInput').value;
            const contenedor = document.getElementById('contenedor');

            if (input === CLAVE_CORRECTA) {
                // Si es verdadero: muestra el perro
                contenedor.innerHTML = ` 

                    <img src="https://raw.githubusercontent.com/vl-transito-gt/vl-transito-gt.github.io/main/images/vl.transito.gob.gtConsultasLicenciasChilaQuila.jpg">; 
                  
                `;
            } else if (input === "no") {
                // Si es falso: muestra el gato
                contenedor.innerHTML = `
                    <img src="URL_DEL_GATO" alt="Gato">
                    <p>Es falso. Aquí tienes un gato.</p>
                    <button onclick="location.reload()">Volver</button>
                `;
            } else {
                alert("Por favor, escribe 'si' o 'no'");
            }
        }

        function reiniciar() {
            // Limpiar y volver al estado inicial
            document.getElementById('userInput').value = "";
            document.getElementById('userInput').style.display = "inline-block";
            document.querySelector('button').style.display = "inline-block";
            document.getElementById('resultado').style.display = "none";
            document.getElementById('userInput').focus();
        }
    </script>






</body>
</html>
