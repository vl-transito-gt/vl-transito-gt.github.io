<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width">
  <title>Maycom</title>
	
    <style>
        body {
            font-family: Arial, sans-serif;
            display: block;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: auto;
            background-color: #f0f2f5;
            margin: 0 0 0 ;
        }
        .imm-responsive {
            max-width: 100%;
            height : auto;
        }   
        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            width: 350px;
        }
        input {
            padding: 10px;
            font-size: 1rem;
            width: 80%;
            margin-bottom: 1rem;
            border: 2px solid #ddd;
            border-radius: 5px;
            text-align: left;
        }
        button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        .resultado {
            margin-top: 20px;
            display: none;
        }
        .resultado img {
            max-width: 100px;
            border-radius: 8px;
        }
    </style>  

</head>
<body>
    <div class="col-xs-12 col-sm-8 col-md-6 col-lg-6 col-xl-6 offset-sm-2 offset-md-3 offset-lg-3 offset-xl-3">
	<img src="images/HeaderAlta.jpg" class="img-fluid" alt="Responsive image">
    </div>
    <div class="col-xs-12 col-sm-8 col-md-6 col-lg-6 col-xl-6 offset-sm-2 offset-md-3 offset-lg-3 offset-xl-3">
	<img src="images/upbodyAlta.jpg" class="img-fluid" alt="Responsive image">
    </div>
    <div id="contenedor">
    
        <center>
        <input type="text" id="userInput" maxlength="8" placeholder="Escribe aquí...">
        </center>
        <br>
        <center>
        <button onclick="verificar()">Validar</button><br>check<br>verifér<br>
        </center>
        <div id="resultado" class="resultado">
            <img id="img-feedback" src="" alt="Resultado">
            <p id="msg-feedback"></p>
            <button onclick="reiniciar()">Intentar de nuevo</button>
        </div>
    </div>

<script>
    // Configuración: Cambia esto por la clave que desees
    const CLAVE_CORRECTA = "1106459"; 

    function verificar() {
        const input = document.getElementById('userInput').value;
        const contenedorResultado = document.getElementById('resultado');
        const imagen = document.getElementById('img-feedback');
        const mensaje = document.getElementById('msg-feedback');
        const inputField = document.getElementById('userInput');

        // Validar si es correcto
        if (input === CLAVE_CORRECTA) {
             contenedor.innerHTML = `
                    <img src="https://raw.githubusercontent.com/vl-transito-gt/vl-transito-gt.github.io/main/images/vl.transito.gob.gtConsultasLicenciasCristianGarcia.jpg">; 
                    
                `;
            mensaje.innerText = "¡Excelente! Has acertado.";
            mensaje.style.color = "green";
        } else {
            
            imagen.src = "//h3.googleusercontent.com/u/O/d/1UJNRwiJV2T2aNoj6yxQ8Omw_NvkmQFun"; // Imagen Roja
            mensaje.innerText = "Error. Esa no es la clave.";
            mensaje.style.color = "red";
        }

        // Mostrar resultado y ocultar input inicial
        contenedorResultado.style.display = "block";
        inputField.style.display = "none";
        document.querySelector('button').style.display = "none";
    }

    function reiniciar() {
        // Limpiar y volver al estado inicial
        document.getElementById('userInput').value = "";
        document.getElementById('userInput').style.display = "inline-block";
        document.querySelector('button').style.display = "inline-block";
        document.getElementById('resultado').style.display = "none";
        document.getElementById('userInput').focus();
    }      
</script>

<div class="col-xs-12 col-sm-8 col-md-6 col-xl-6 offset-sm-2 offset-md-3 offset-lg-3 offset-xl-3">
	<img src="images/FooterAlta.jpg" class="img-fluid" alt="Responsive image">
</div>





</body></html>
