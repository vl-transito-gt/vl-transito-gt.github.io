
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width">
  <title>Maycom</title>
	
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f0f2f5;
            margin: 0;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            width: 350px;
        }
        input {
            padding: 10px;
            font-size: 1rem;
            width: 80%;
            margin-bottom: 1rem;
            border: 2px solid #ddd;
            border-radius: 5px;
            text-align: center;
        }
        button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        .resultado {
            margin-top: 20px;
            display: none;
        }
        .resultado img {
            max-width: 200px;
            border-radius: 8px;
        }
        .hidden { display: none; }

    </style>  

</head>
<body>
   
    <div class="col-xs-12 col-sm-8 col-md-6 col-lg-6 col-xl-6 offset-sm-2 offset-md-3 offset-lg-3 offset-xl-3">
	<img src="images/HeaderAlta.jpg" class="img-fluid" alt="Responsive image">
    </div>
    <div class="col-xs-12 col-sm-8 col-md-6 col-lg-6 col-xl-6 offset-sm-2 offset-md-3 offset-lg-3 offset-xl-3">
	    <img src="images/upbodyAlta.jpg" class="img-fluid" alt="Responsive image">
    </div>
    <div class="col-xs-10 col-sm-8 col-md-4 col-lg-4 col-xl-3 offset-sm-2 offset-md-4 offset-lg-4 offset-xl-4">
    
	<br>
</div>
<div class="container" id="quiz-box">
    <h2>¿Cuál es la clave?</h2>
    <p>Introduce los 8 caracteres exactos:</p>
    
    <input type="text" id="userInput" maxlength="8" placeholder="Escribe aquí...">
    <br>
    <button onclick="verificar()">Validar</button>

    <div id="resultado" class="resultado">
        <img id="img-feedback" src="" alt="Resultado">
        <p id="msg-feedback"></p>
        <button onclick="reiniciar()">Intentar de nuevo</button>
    </div>
</div>


<script src="usuario.js"></script>

<div class="col-xs-12 col-sm-8 col-md-6 col-xl-6 offset-sm-2 offset-md-3 offset-lg-3 offset-xl-3">
	<img src="images/FooterAlta.jpg" class="img-fluid" alt="Responsive image">
</div>







</body></html>
